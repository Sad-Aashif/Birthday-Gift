<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Happy Birthday Bachcha 🎉</title><link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script><style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#050505;
color:white;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* start screen */

#start-screen{
position:absolute;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.start-btn{
padding:15px 40px;
font-size:1.4rem;
border:none;
border-radius:40px;
background:#ff4d6d;
color:white;
cursor:pointer;
font-family:Pacifico,cursive;
}

/* main */

#main-container{
display:none;
flex-direction:column;
align-items:center;
width:90%;
max-width:800px;
}

/* timer */

.timer{
font-size:2rem;
margin-bottom:10px;
color:#ffd166;
font-family:Pacifico,cursive;
}

.progress{
width:100%;
height:10px;
background:#333;
border-radius:20px;
margin-bottom:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:#ff4d6d;
width:100%;
transition:width 1s linear;
}

/* slideshow */

.slideshow{
width:100%;
height:320px;
background:#111;
border-radius:15px;
overflow:hidden;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.slide{
position:absolute;
opacity:0;
transition:opacity 1s;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.slide.active{
opacity:1;
}

.slide img{
max-width:100%;
max-height:100%;
}

.caption{
position:absolute;
bottom:10px;
background:rgba(0,0,0,0.6);
padding:8px 18px;
border-radius:20px;
}

/* final message */

#final-message{
display:none;
opacity:0;
transition:opacity 2s;
}

#message{
white-space:pre-line;
font-size:1.1rem;
margin-top:10px;
}

button{
background:#ffd166;
border:none;
padding:10px 25px;
font-size:1.1rem;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

</style></head><body><audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio><div id="start-screen"><h1>🎁</h1>
<h2>A Surprise Awaits</h2><button class="start-btn" onclick="start()">Open</button>

</div><div id="main-container"><div class="timer">
<span id="time">60</span> seconds remaining
</div><div class="progress">
<div class="progress-fill" id="bar"></div>
</div><div class="slideshow"><div class="slide active">
<img src="Mu1.png">
<div class="caption">My Appcent Gurlly 😇</div>
</div><div class="slide">
<img src="Mu2.png">
<div class="caption">My Gorgeous Model 😍</div>
</div><div class="slide">
<img src="Mu3.png">
<div class="caption">My Black Cat 😻</div>
</div><div class="slide">
<img src="Mu4.png">
<div class="caption">Best Commitment 💌</div>
</div><div class="slide">
<img src="Mu5.png">
<div class="caption">Our Confession Day 💞</div>
</div></div><div id="final-message"><h1>Happy Birthday 😘🥰🎂🎀</h1><p id="message"></p><button onclick="celebrate()">Celebrate 🎊</button>

</div></div><script>

let time=60
let slide=0

const slides=document.querySelectorAll(".slide")
const music=document.getElementById("music")

function start(){

document.getElementById("start-screen").style.display="none"
document.getElementById("main-container").style.display="flex"

music.volume=0.4
music.play()

timer()
slideshow()

}

function timer(){

let t=setInterval(()=>{

time--

document.getElementById("time").textContent=time
document.getElementById("bar").style.width=(time/60)*100+"%"

if(time<=0){

clearInterval(t)
showMessage()

}

},1000)

}

function slideshow(){

setInterval(()=>{

slides[slide].classList.remove("active")

slide=(slide+1)%slides.length

slides[slide].classList.add("active")

},12000)

}

function showMessage(){

const msg=`Thank you for being such an amazing person in my life.
I hope this day is as special as you are!
Here's to many more memories together! 💌🥳`

document.getElementById("final-message").style.display="block"

setTimeout(()=>{
document.getElementById("final-message").style.opacity="1"
type(msg)
},100)

}

function type(text){

let i=0

let typing=setInterval(()=>{

document.getElementById("message").innerHTML+=text.charAt(i)

i++

if(i>=text.length){
clearInterval(typing)
}

},40)

}

function celebrate(){

confetti({
particleCount:150,
spread:70,
origin:{y:0.6}
})

}

</script></body>
</html>
