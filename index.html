<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Baccha 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

:root{
--primary:#ff4d6d;
--secondary:#ffd166;
--bg:#050505;
--text:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
text-align:center;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:float 8s linear infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* start screen */

#start-screen{
position:absolute;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

.start-btn{
padding:15px 40px;
font-size:1.4rem;
border:none;
border-radius:40px;
background:var(--primary);
color:white;
cursor:pointer;
font-family:'Pacifico',cursive;
box-shadow:0 0 25px rgba(255,77,109,0.5);
transition:0.3s;
}

.start-btn:hover{
transform:scale(1.1);
}

/* main container */

#main-container{
display:none;
flex-direction:column;
align-items:center;
width:90%;
max-width:800px;
}

/* timer */

.timer-box{
font-size:2rem;
margin-bottom:15px;
color:var(--secondary);
font-family:'Pacifico',cursive;
}

.progress-bar{
width:100%;
height:10px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
}

.progress-fill{
height:100%;
width:100%;
background:var(--primary);
transition:width 1s linear;
}

/* slideshow */

.slideshow{
width:100%;
height:320px;
background:#111;
border-radius:15px;
overflow:hidden;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.7);
margin-bottom:25px;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1s ease;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:contain;
background:black;
}
animation:zoom 12s linear;
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

.slide-caption{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:8px 18px;
border-radius:20px;
font-size:1rem;
}

/* final message */

#final-message{
display:none;
opacity:0;
transition:opacity 2s ease;
}

h1{
font-family:'Pacifico',cursive;
color:var(--secondary);
margin-bottom:15px;
}

.message-text{
font-size:1.1rem;
line-height:1.6;
max-width:600px;
margin:auto;
margin-bottom:25px;
min-height:80px;
}

.unlock-btn{
background:var(--secondary);
border:none;
padding:12px 28px;
font-size:1.1rem;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.unlock-btn:hover{
background:#ffc233;
}

/* mobile */

@media(max-width:600px){

.slideshow{
height:220px;
}

.timer-box{
font-size:1.5rem;
}

}

</style>
</head>

<body>

<audio id="bg-music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/16/audio_6d76f5e8e5.mp3">
</audio>

<!-- hearts -->

<div class="heart" style="left:10%">❤</div>
<div class="heart" style="left:25%">❤</div>
<div class="heart" style="left:50%">❤</div>
<div class="heart" style="left:70%">❤</div>
<div class="heart" style="left:85%">❤</div>

<!-- start screen -->

<div id="start-screen">

<h1 style="font-size:3rem;">🎁</h1>
<h2 style="margin:20px;">A Surprise Awaits</h2>

<button class="start-btn" onclick="startExperience()">
Open
</button>

</div>

<!-- main -->

<div id="main-container">

<div class="timer-box">
<span id="timer">60</span> seconds remaining
</div>

<div class="progress-bar">
<div class="progress-fill" id="progress-fill"></div>
</div>

<div class="slideshow">

<div class="slide active">
<img src="Mu1.png">
<div class="slide-caption">Shot At Clothes Store</div>
</div>

<div class="slide">
<img src="Mu2.png">
<div class="slide-caption">My Gorgeous Model</div>
</div>

<div class="slide">
<img src="Mu3.png">
<div class="slide-caption">That Black Cat</div>
</div>

<div class="slide">
<img src="Mu4.png">
<div class="slide-caption">Best Commitment</div>
</div>

<div class="slide">
<img src="Mu5.png">
<div class="slide-caption">Our Confession Day</div>
</div>

</div>

<div id="final-message">

<h1>Happy Birthday Mussu 🥰😘🎂🎊</h1>

<p class="message-text" id="typeText"></p>

<button class="unlock-btn" onclick="celebrate()">
Celebrate 🎊
</button>

</div>

</div>

<script>

const startScreen=document.getElementById("start-screen")
const mainContainer=document.getElementById("main-container")
const music=document.getElementById("bg-music")

const timerDisplay=document.getElementById("timer")
const progressFill=document.getElementById("progress-fill")

const finalMessage=document.getElementById("final-message")
const slides=document.querySelectorAll(".slide")

let timeLeft=60
let slideIndex=0

function startExperience(){

startScreen.style.display="none"
mainContainer.style.display="flex"

fadeMusic()

startTimer()
startSlides()

}

function fadeMusic(){

music.volume=0
music.play()

let fade=setInterval(()=>{

if(music.volume<0.5){
music.volume+=0.05
}else{
clearInterval(fade)
}

},200)

}

function startTimer(){

let timer=setInterval(()=>{

timeLeft--

timerDisplay.textContent=timeLeft

progressFill.style.width=(timeLeft/60)*100+"%"

if(timeLeft<=0){

clearInterval(timer)

showFinal()

}

},1000)

}

function startSlides(){

setInterval(()=>{

slides[slideIndex].classList.remove("active")

slideIndex=(slideIndex+1)%slides.length

slides[slideIndex].classList.add("active")

},12000)

}

function showFinal(){

finalMessage.style.display="block"

setTimeout(()=>{
finalMessage.style.opacity="1"
typeWriter()
},100)

}

function typeWriter(){

const text="Thank you for being such a special person in my life. Every moment with you becomes a memory worth keeping. I hope your birthday is full of happiness, love and beautiful surprises."

let i=0

let typing=setInterval(()=>{

document.getElementById("typeText").innerHTML+=text.charAt(i)

i++

if(i>=text.length){
clearInterval(typing)
}

},40)

}

function celebrate(){

confetti({
particleCount:150,
spread:70,
origin:{y:0.6}
})

setTimeout(()=>{
confetti({
particleCount:100,
spread:60,
origin:{x:0.2,y:0.5}
})
},300)

setTimeout(()=>{
confetti({
particleCount:100,
spread:60,
origin:{x:0.8,y:0.5}
})
},600)

}

</script>

</body>
</html>
